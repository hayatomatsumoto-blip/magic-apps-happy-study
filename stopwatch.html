<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="description" content="マジックショー用フィクションUI。実在のスマホ画面ではありません。">
  <title> </title>
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-user-select: none; user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    html, body { width: 100%; height: 100%; overflow: hidden; }

    /* ── HOME SCREEN ─────────────────────────── */
    #home {
      position: fixed; inset: 0;
      background: linear-gradient(160deg, #0d1b2a 0%, #1b263b 55%, #415a77 100%);
      display: flex; flex-direction: column;
    }

    .status-bar {
      height: 28px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: flex-end;
      padding: 0 14px; gap: 7px;
    }
    .s-time {
      color: #fff; font-family: -apple-system, sans-serif;
      font-size: 13px; font-weight: 600;
    }

    #home-widget {
      text-align: center; padding: 28px 20px 20px; flex-shrink: 0;
      touch-action: manipulation;
    }
    #hw-time {
      color: #fff; font-family: -apple-system, sans-serif;
      font-size: 68px; font-weight: 100; letter-spacing: 2px; line-height: 1;
      pointer-events: none;
    }
    #hw-date {
      color: rgba(255,255,255,0.75);
      font-family: -apple-system, sans-serif; font-size: 15px; margin-top: 4px;
      pointer-events: none;
    }

    #app-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px 4px;
      padding: 12px 12px 4px;
      align-content: start; overflow: hidden;
    }

    .app-icon {
      display: flex; flex-direction: column;
      align-items: center; gap: 5px;
      touch-action: manipulation;
      cursor: pointer;
    }
    .app-img {
      width: 54px; height: 54px; border-radius: 13px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
    }
    .app-label {
      color: rgba(255,255,255,0.88);
      font-family: -apple-system, sans-serif; font-size: 11px;
      text-align: center; text-shadow: 0 1px 4px rgba(0,0,0,0.6);
      line-height: 1.2;
    }

    #search-bar {
      margin: 4px 14px 6px; flex-shrink: 0;
      background: rgba(255,255,255,0.14); border-radius: 24px;
      height: 42px; display: flex; align-items: center; padding: 0 14px; gap: 8px;
      color: rgba(255,255,255,0.65);
      font-family: -apple-system, sans-serif; font-size: 14px;
      touch-action: manipulation;
    }

    #dock {
      height: 90px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-around;
      padding: 0 18px;
      background: rgba(255,255,255,0.09);
      backdrop-filter: blur(24px);
      border-top: 1px solid rgba(255,255,255,0.1);
      position: relative;
    }

    /* 秘密トリガー（ドック内のChromeとグリッドの隙間） */
    #dock-trigger {
      flex: 1;
      min-width: 44px;
      max-width: 72px;
      height: 54px;
      background: transparent;
      touch-action: manipulation;
      flex-shrink: 0;
    }

    /* ── CLOCK APP ───────────────────────────── */
    #clock-app {
      position: fixed; inset: 0; background: #000;
      display: none; flex-direction: column;
    }
    #clock-app.open { display: flex; }

    #clock-tabs {
      display: flex; justify-content: space-around;
      border-bottom: 1px solid #1c1c1e;
      padding: 0 4px; flex-shrink: 0;
    }
    .ctab {
      color: #555;
      font-family: -apple-system, sans-serif;
      font-size: 12px; letter-spacing: 0.8px; font-weight: 600;
      padding: 14px 8px; text-transform: uppercase;
      border-bottom: 2px solid transparent;
    }
    .ctab.active { color: #00bcd4; border-bottom-color: #00bcd4; }

    #sw-main {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 56px;
    }

    #time-disp {
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      font-size: 80px; font-weight: 200;
      letter-spacing: 6px; font-variant-numeric: tabular-nums;
      padding: 16px 24px;
      touch-action: manipulation;
    }

    #sw-btns {
      display: flex; align-items: center; gap: 52px;
    }

    .sw-side {
      width: 66px; height: 66px; border-radius: 50%;
      background: #111; border: 2px solid #222;
      color: #444;
      font-family: -apple-system, sans-serif;
      font-size: 13px; font-weight: 700; letter-spacing: 0.5px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      touch-action: manipulation;
    }
    .sw-side.on { color: #ccc; border-color: #444; }

    #fab {
      width: 82px; height: 82px; border-radius: 50%;
      background: #1b5e20; color: #69f0ae;
      font-family: -apple-system, sans-serif;
      font-size: 14px; font-weight: 800; letter-spacing: 0.5px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; border: none;
      touch-action: manipulation;
      box-shadow: 0 4px 20px rgba(27,94,32,0.55);
      transition: background 0.15s, box-shadow 0.15s;
    }
    #fab.stop {
      background: #b71c1c; color: #ff8a80;
      box-shadow: 0 4px 20px rgba(183,28,28,0.55);
    }

    #back-row {
      padding: 10px 16px; flex-shrink: 0;
      color: #00bcd4;
      font-family: -apple-system, sans-serif; font-size: 15px;
      cursor: pointer; align-self: flex-start;
      touch-action: manipulation;
    }

    /* ── INVISIBLE NUMPAD ──────────────────── */
    #numpad {
      position: fixed; inset: 0;
      visibility: hidden; opacity: 0; z-index: 9999;
      pointer-events: none;
      touch-action: manipulation;
      /* 完全透明。active時のみタップを受け付ける */
    }
    #numpad.active { visibility: visible; display: grid; pointer-events: auto; }
    #numpad-grid {
      width: 100%; height: 100%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(4, 1fr);
    }
    .nk { touch-action: manipulation; /* 各セル - 見えないがタップ可能 */ }
  </style>
</head>
<body>

  <!-- ═══ CLOCK APP ═══ -->

<script>
// ── STATE ────────────────────────────────────────────────
let targetSum = 0;
try {
  targetSum = parseInt(sessionStorage.getItem('sw_target') || '0', 10) || 0;
} catch (e) {
  targetSum = 0;
}
let swRunning    = false;
let swStartTime  = 0;
let swElapsedMs  = 0;
let swRafId      = null;
let npInput      = '';
let npAutoClose  = null;

// ── ELEMENTS ─────────────────────────────────────────────
const clockApp    = document.getElementById('clock-app');
const timeDsp     = document.getElementById('time-disp');
const fab         = document.getElementById('fab');
const lapBtn      = document.getElementById('lap-btn');
const resetBtn    = document.getElementById('reset-btn');
const triggerZone = document.getElementById('dock-trigger');
const numpad      = document.getElementById('numpad');
const hwTime      = document.getElementById('hw-time');
const homeWidget  = document.getElementById('home-widget');
const hwDate      = document.getElementById('hw-date');
const stEls       = [document.getElementById('st1'), document.getElementById('st2')];

// ── REAL CLOCK ───────────────────────────────────────────
const DAYS   = ['日曜日','月曜日','火曜日','水曜日','木曜日','金曜日','土曜日'];
const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

function tickClock() {
  const n = new Date();
  const t = `${pad(n.getHours())}:${pad(n.getMinutes())}`;
  hwTime.textContent = t;
  stEls.forEach(el => { if(el) el.textContent = t; });
  hwDate.textContent = `${DAYS[n.getDay()]}, ${MONTHS[n.getMonth()]}${n.getDate()}日`;
}
tickClock();
setInterval(tickClock, 1000);

// ── NAVIGATION ───────────────────────────────────────────
function openClock() {
  resetSW();
  clockApp.classList.add('open');
}
function closeClock() {
  clockApp.classList.remove('open');
}

// ── STOPWATCH ────────────────────────────────────────────
function toggleSW() {
  if (!swRunning) startSW(); else stopSW();
}
function tryResetSW() {
  if (!swRunning) resetSW();
}

function startSW() {
  swRunning   = true;
  swStartTime = Date.now() - swElapsedMs;
  fab.textContent = 'STOP';
  fab.classList.add('stop');
  lapBtn.classList.add('on');
  swRafId = requestAnimationFrame(tickSW);
}

function stopSW() {
  cancelAnimationFrame(swRafId);
  swRunning = false;
  fab.textContent = 'START';
  fab.classList.remove('stop');
  resetBtn.classList.add('on');

  // フォース適用
  const forced = targetSum > 0 ? findForced(swElapsedMs, targetSum) : null;
  timeDsp.textContent = formatMs(forced !== null ? forced : swElapsedMs);
}

function resetSW() {
  cancelAnimationFrame(swRafId);
  swRunning = swElapsedMs = 0;
  fab.textContent = 'START';
  fab.classList.remove('stop');
  lapBtn.classList.remove('on');
  resetBtn.classList.remove('on');
  timeDsp.textContent = '00.00';
}

function tickSW() {
  swElapsedMs = Date.now() - swStartTime;
  timeDsp.textContent = formatMs(swElapsedMs);
  swRafId = requestAnimationFrame(tickSW);
}

// ── FORMAT ───────────────────────────────────────────────
function formatMs(ms) {
  const cs = Math.floor(ms / 10);
  const ss = Math.floor(cs / 100);
  const cc = cs % 100;
  return `${pad(ss)}.${pad(cc)}`;
}
function pad(n) { return String(n).padStart(2, '0'); }

// ── FORCE ALGORITHM ───────────────────────────────────────
// 観客が止めた瞬間、「各桁の合計 = targetSum」に最も近い時間を探して表示
function findForced(actualMs, T) {
  const actualCs = Math.round(actualMs / 10);
  for (let d = 0; d <= 1500; d++) {
    const checks = d === 0 ? [actualCs] : [actualCs + d, actualCs - d];
    for (const c of checks) {
      if (c < 50 || c > 9999) continue; // 0.50s〜99.99s の範囲
      const ss = Math.floor(c / 100);
      const cc = c % 100;
      // 4桁の和
      if (Math.floor(ss/10) + (ss%10) + Math.floor(cc/10) + (cc%10) === T) {
        return c * 10; // ms で返す
      }
    }
  }
  return null; // 万が一見つからなければ null（実際の時間を表示）
}

// ── TAP HANDLING ─────────────────────────────────────────
// タップ操作はすべて click イベントに統一する。
// touchstart/touchend/mousedown を併用し、手動の抑制時間窓で
// 二重発火を防ぐ従来方式は、Android Chrome / iOS Safari / iOS Chrome
// それぞれでゴーストクリックの発火タイミングが異なるため、
// 端末によってタップ自体が握りつぶされる不具合の原因になっていた。
// viewport でズームを無効化し touch-action: manipulation を
// 各タップ対象に設定してあるため、click は遅延なく1タップ=1回で発火する。
function handleUiTap(e) {
  if (numpad.classList.contains('active')) return;
  // 秘密トリガー領域は別ハンドラで処理
  if (e.target.closest('#home-widget, #search-bar, #dock-trigger, #time-disp')) return;

  const t = e.target;
  if (t.closest('#clock-icon')) openClock();
  else if (t.closest('#back-row')) closeClock();
  else if (t.closest('#fab')) toggleSW();
  else if (t.closest('#reset-btn')) tryResetSW();
}

document.body.addEventListener('click', handleUiTap);

// ── VIBRATION ────────────────────────────────────────────
function vibrate(pat) {
  try { navigator.vibrate(pat); } catch(e) {}
}

// ── SECRET TRIGGER (トリプルタップ) ───────────────────────
let secretTapCount = 0;
let secretTapTimer = null;

function onSecretTap(source) {
  if (source === 'stopwatch' && swRunning) return;
  secretTapCount++;
  vibrate(30);
  clearTimeout(secretTapTimer);
  secretTapTimer = setTimeout(() => { secretTapCount = 0; }, 2000);
  if (secretTapCount >= 3) {
    secretTapCount = 0;
    clearTimeout(secretTapTimer);
    // 誤って開いた透明テンキーはもう一度トリプルタップで閉じられる
    if (numpad.classList.contains('active')) closeNumpad();
    else openNumpad();
  }
}

function attachSecretTap(el, source) {
  if (!el) return;
  el.addEventListener('click', () => onSecretTap(source));
}

attachSecretTap(triggerZone, 'dock');
attachSecretTap(homeWidget, 'home');
attachSecretTap(document.getElementById('search-bar'), 'search');
attachSecretTap(timeDsp, 'stopwatch');

// ── INVISIBLE NUMPAD ─────────────────────────────────────
// レイアウト（3×4、0%透明でマジシャンのみが位置を把握）:
// [1][2][3]
// [4][5][6]
// [7][8][9]
// [⌫][0][✓]
function openNumpad() {
  npInput = '';
  numpad.classList.add('active');
  vibrate([40, 30, 40, 30, 40]); // 「入力モード開始」合図（3連続）
  startNpTimeout();
}
function closeNumpad() {
  numpad.classList.remove('active');
  clearTimeout(npAutoClose);
}
// 起動時は必ず通常モード
closeNumpad();
function startNpTimeout() {
  clearTimeout(npAutoClose);
  npAutoClose = setTimeout(closeNumpad, 15000);
}

numpad.addEventListener('click', handleNp);

function handleNp(e) {
  const col = Math.min(Math.floor((e.clientX / window.innerWidth)  * 3), 2);
  const row = Math.min(Math.floor((e.clientY / window.innerHeight) * 4), 3);

  const keys = [['1','2','3'],['4','5','6'],['7','8','9'],['del','0','ok']];
  const k = keys[row][col];

  if (k === 'ok') {
    const v = parseInt(npInput);
    if (!isNaN(v) && v >= 1 && v <= 36) {
      targetSum = v;
      try { sessionStorage.setItem('sw_target', String(v)); } catch (e) {}
      vibrate([60, 40, 60, 40, 200]); // 確定（強め）
    } else {
      vibrate([30,20,30,20,30,20,30,20,30]); // エラー
    }
    closeNumpad();
  } else if (k === 'del') {
    npInput = npInput.slice(0, -1);
    vibrate(25);
  } else {
    if (npInput.length < 2) {
      npInput += k;
      vibrate(45);
    }
  }
  startNpTimeout();
}
</script>
