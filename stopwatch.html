<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="description" content="マジックショー用フィクションUI。実在のスマホ画面ではありません。">
  <title> </title>
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-user-select: none; user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    html, body { width: 100%; height: 100%; overflow: hidden; }

    /* ── HOME SCREEN ─────────────────────────── */
    #home {
      position: fixed; inset: 0;
      background: linear-gradient(160deg, #0d1b2a 0%, #1b263b 55%, #415a77 100%);
      display: flex; flex-direction: column;
    }

    .status-bar {
      height: 28px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: flex-end;
      padding: 0 14px; gap: 7px;
    }
    .s-time {
      color: #fff; font-family: -apple-system, sans-serif;
      font-size: 13px; font-weight: 600;
    }

    #home-widget {
      text-align: center; padding: 20px 0 12px; flex-shrink: 0;
    }
    #hw-time {
      color: #fff; font-family: -apple-system, sans-serif;
      font-size: 68px; font-weight: 100; letter-spacing: 2px; line-height: 1;
    }
    #hw-date {
      color: rgba(255,255,255,0.75);
      font-family: -apple-system, sans-serif; font-size: 15px; margin-top: 4px;
    }

    #app-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px 4px;
      padding: 12px 12px 4px;
      align-content: start; overflow: hidden;
    }

    .app-icon {
      display: flex; flex-direction: column;
      align-items: center; gap: 5px;
    }
    .app-img {
      width: 54px; height: 54px; border-radius: 13px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
    }
    .app-label {
      color: rgba(255,255,255,0.88);
      font-family: -apple-system, sans-serif; font-size: 11px;
      text-align: center; text-shadow: 0 1px 4px rgba(0,0,0,0.6);
      line-height: 1.2;
    }

    #search-bar {
      margin: 4px 14px 6px; flex-shrink: 0;
      background: rgba(255,255,255,0.14); border-radius: 24px;
      height: 42px; display: flex; align-items: center; padding: 0 14px; gap: 8px;
      color: rgba(255,255,255,0.65);
      font-family: -apple-system, sans-serif; font-size: 14px;
    }

    #dock {
      height: 90px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-around;
      padding: 0 18px;
      background: rgba(255,255,255,0.09);
      backdrop-filter: blur(24px);
      border-top: 1px solid rgba(255,255,255,0.1);
      position: relative;
    }

    /* 秘密トリガーゾーン（3番目と4番目のアイコンの隙間） */
    #trigger-zone {
      position: absolute; top: 0; height: 100%; width: 24px;
      /* 右から数えて2番目のアイコンの右側に配置 */
      right: calc(25% + 8px);
      background: transparent; z-index: 20;
    }

    /* ── CLOCK APP ───────────────────────────── */
    #clock-app {
      position: fixed; inset: 0; background: #000;
      display: none; flex-direction: column;
    }
    #clock-app.open { display: flex; }

    #clock-tabs {
      display: flex; justify-content: space-around;
      border-bottom: 1px solid #1c1c1e;
      padding: 0 4px; flex-shrink: 0;
    }
    .ctab {
      color: #555;
      font-family: -apple-system, sans-serif;
      font-size: 12px; letter-spacing: 0.8px; font-weight: 600;
      padding: 14px 8px; text-transform: uppercase;
      border-bottom: 2px solid transparent;
    }
    .ctab.active { color: #00bcd4; border-bottom-color: #00bcd4; }

    #sw-main {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 56px;
    }

    #time-disp {
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      font-size: 80px; font-weight: 200;
      letter-spacing: 6px; font-variant-numeric: tabular-nums;
    }

    #sw-btns {
      display: flex; align-items: center; gap: 52px;
    }

    .sw-side {
      width: 66px; height: 66px; border-radius: 50%;
      background: #111; border: 2px solid #222;
      color: #444;
      font-family: -apple-system, sans-serif;
      font-size: 13px; font-weight: 700; letter-spacing: 0.5px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .sw-side.on { color: #ccc; border-color: #444; }

    #fab {
      width: 82px; height: 82px; border-radius: 50%;
      background: #1b5e20; color: #69f0ae;
      font-family: -apple-system, sans-serif;
      font-size: 14px; font-weight: 800; letter-spacing: 0.5px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; border: none;
      box-shadow: 0 4px 20px rgba(27,94,32,0.55);
      transition: background 0.15s, box-shadow 0.15s;
    }
    #fab.stop {
      background: #b71c1c; color: #ff8a80;
      box-shadow: 0 4px 20px rgba(183,28,28,0.55);
    }

    #back-row {
      padding: 10px 16px; flex-shrink: 0;
      color: #00bcd4;
      font-family: -apple-system, sans-serif; font-size: 15px;
      cursor: pointer; align-self: flex-start;
    }

    /* ── INVISIBLE NUMPAD ──────────────────── */
    #numpad {
      position: fixed; inset: 0;
      display: none; opacity: 0; z-index: 9999;
      /* 完全透明。pointer-eventsは有効 */
    }
    #numpad.active { display: grid; }
    #numpad-grid {
      width: 100%; height: 100%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(4, 1fr);
    }
    .nk { /* 各セル - 見えないがタップ可能 */ }
  </style>
</head>
<body>

  <!-- ═══ HOME SCREEN ═══ -->
  <div id="home">
    <!-- ステータスバー -->
    <div class="status-bar">
      <svg width="16" height="11" viewBox="0 0 16 11" fill="white">
        <rect x="0" y="4" width="3" height="7" rx="1" opacity=".35"/>
        <rect x="4.5" y="2.5" width="3" height="8.5" rx="1" opacity=".55"/>
        <rect x="9" y="1" width="3" height="10" rx="1" opacity=".8"/>
        <rect x="13.5" y="0" width="2.5" height="11" rx="1"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 20 14" fill="white">
        <path d="M10 2C6 2 2.5 3.8.2 6.5L10 14l9.8-7.5C17.5 3.8 14 2 10 2z" opacity=".55"/>
        <path d="M10 5.5c-2.3 0-4.3 1-5.7 2.5L10 12.5l5.7-4.5C14.3 6.5 12.3 5.5 10 5.5z" opacity=".8"/>
        <path d="M10 9c-1 0-1.9.4-2.5 1.1L10 12l2.5-1.9C11.9 9.4 11 9 10 9z"/>
      </svg>
      <svg width="24" height="12" viewBox="0 0 28 14" fill="none">
        <rect x=".75" y=".75" width="23.5" height="12.5" rx="3" stroke="white" stroke-width="1.5" opacity=".55"/>
        <rect x="2.5" y="3" width="16" height="8" rx="1.5" fill="white"/>
        <path d="M26 5v4a2 2 0 000-4z" fill="white" opacity=".4"/>
      </svg>
      <span class="s-time" id="st1">00:00</span>
    </div>

    <!-- 時計ウィジェット -->
    <div id="home-widget">
      <div id="hw-time">00:00</div>
      <div id="hw-date">月曜日, 6月30日</div>
    </div>

    <!-- アプリグリッド -->
    <div id="app-grid">
      <div class="app-icon"><div class="app-img" style="background:#388E3C">📱</div><div class="app-label">電話</div></div>
      <div class="app-icon"><div class="app-img" style="background:#1976D2">💬</div><div class="app-label">メッセージ</div></div>
      <div class="app-icon"><div class="app-img" style="background:#E53935">📧</div><div class="app-label">Gmail</div></div>
      <div class="app-icon"><div class="app-img" style="background:#F57C00">📸</div><div class="app-label">カメラ</div></div>
      <div class="app-icon"><div class="app-img" style="background:#1565C0">📅</div><div class="app-label">カレンダー</div></div>
      <div class="app-icon"><div class="app-img" style="background:#00897B">🗺️</div><div class="app-label">マップ</div></div>
      <div class="app-icon"><div class="app-img" style="background:#B71C1C">▶️</div><div class="app-label">YouTube</div></div>
      <div class="app-icon"><div class="app-img" style="background:#616161">⚙️</div><div class="app-label">設定</div></div>
      <div class="app-icon"><div class="app-img" style="background:#F57C00">🎵</div><div class="app-label">音楽</div></div>
      <div class="app-icon"><div class="app-img" style="background:#26A69A">🖼️</div><div class="app-label">フォト</div></div>
      <div class="app-icon"><div class="app-img" style="background:#4527A0">🌐</div><div class="app-label">Chrome</div></div>
      <!-- 時計（ここだけタップで遷移） -->
      <div class="app-icon" id="clock-icon">
        <div class="app-img" style="background:#1A237E">🕐</div>
        <div class="app-label">時計</div>
      </div>
    </div>

    <!-- 検索バー -->
    <div id="search-bar">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="rgba(255,255,255,0.45)">
        <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
      </svg>
      検索または URL を入力
    </div>

    <!-- ドック -->
    <div id="dock">
      <div class="app-icon"><div class="app-img" style="background:#388E3C;width:54px;height:54px;border-radius:27px">📱</div></div>
      <div class="app-icon"><div class="app-img" style="background:#1976D2;width:54px;height:54px;border-radius:27px">💬</div></div>
      <!-- 秘密トリガー：この透明ゾーンをトリプルタップ -->
      <div id="trigger-zone"></div>
      <div class="app-icon"><div class="app-img" style="background:#4527A0;width:54px;height:54px;border-radius:27px">🌐</div></div>
      <div class="app-icon">
        <div class="app-img" style="background:rgba(255,255,255,0.12);width:54px;height:54px;border-radius:27px">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="white">
            <path d="M4 8h4V4H4v4zm6 12h4v-4h-4v4zm-6 0h4v-4H4v4zm0-6h4v-4H4v4zm6 0h4v-4h-4v4zm6-10v4h4V4h-4zm-6 4h4V4h-4v4zm6 6h4v-4h-4v4zm0 6h4v-4h-4v4z"/>
          </svg>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ CLOCK APP ═══ -->
  <div id="clock-app">
    <div class="status-bar" style="background:#000">
      <svg width="16" height="11" viewBox="0 0 16 11" fill="white">
        <rect x="0" y="4" width="3" height="7" rx="1" opacity=".35"/>
        <rect x="4.5" y="2.5" width="3" height="8.5" rx="1" opacity=".55"/>
        <rect x="9" y="1" width="3" height="10" rx="1" opacity=".8"/>
        <rect x="13.5" y="0" width="2.5" height="11" rx="1"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 20 14" fill="white">
        <path d="M10 2C6 2 2.5 3.8.2 6.5L10 14l9.8-7.5C17.5 3.8 14 2 10 2z" opacity=".55"/>
        <path d="M10 5.5c-2.3 0-4.3 1-5.7 2.5L10 12.5l5.7-4.5C14.3 6.5 12.3 5.5 10 5.5z" opacity=".8"/>
        <path d="M10 9c-1 0-1.9.4-2.5 1.1L10 12l2.5-1.9C11.9 9.4 11 9 10 9z"/>
      </svg>
      <svg width="24" height="12" viewBox="0 0 28 14" fill="none">
        <rect x=".75" y=".75" width="23.5" height="12.5" rx="3" stroke="white" stroke-width="1.5" opacity=".55"/>
        <rect x="2.5" y="3" width="16" height="8" rx="1.5" fill="white"/>
        <path d="M26 5v4a2 2 0 000-4z" fill="white" opacity=".4"/>
      </svg>
      <span class="s-time" id="st2">00:00</span>
    </div>

    <div id="back-row">← 戻る</div>

    <div id="clock-tabs">
      <div class="ctab">アラーム</div>
      <div class="ctab">時計</div>
      <div class="ctab">タイマー</div>
      <div class="ctab active">ストップウォッチ</div>
    </div>

    <div id="sw-main">
      <div id="time-disp">00.00</div>
      <div id="sw-btns">
        <button class="sw-side" id="lap-btn">LAP</button>
        <button id="fab">START</button>
        <button class="sw-side" id="reset-btn">RESET</button>
      </div>
    </div>
  </div>

  <!-- ═══ 透明テンキー（観客には見えない）═══ -->
  <div id="numpad">
    <div id="numpad-grid">
      <div class="nk" data-k="1"></div>
      <div class="nk" data-k="2"></div>
      <div class="nk" data-k="3"></div>
      <div class="nk" data-k="4"></div>
      <div class="nk" data-k="5"></div>
      <div class="nk" data-k="6"></div>
      <div class="nk" data-k="7"></div>
      <div class="nk" data-k="8"></div>
      <div class="nk" data-k="9"></div>
      <div class="nk" data-k="del"></div>
      <div class="nk" data-k="0"></div>
      <div class="nk" data-k="ok"></div>
    </div>
  </div>

<script>
// ── STATE ────────────────────────────────────────────────
let targetSum    = parseInt(sessionStorage.getItem('sw_target') || '0');
let swRunning    = false;
let swStartTime  = 0;
let swElapsedMs  = 0;
let swRafId      = null;
let tapCount     = 0;
let tapTimerId   = null;
let npInput      = '';
let npAutoClose  = null;

// ── ELEMENTS ─────────────────────────────────────────────
const homeEl      = document.getElementById('home');
const clockApp    = document.getElementById('clock-app');
const clockIcon   = document.getElementById('clock-icon');
const backRow     = document.getElementById('back-row');
const timeDsp     = document.getElementById('time-disp');
const fab         = document.getElementById('fab');
const lapBtn      = document.getElementById('lap-btn');
const resetBtn    = document.getElementById('reset-btn');
const triggerZone = document.getElementById('trigger-zone');
const numpad      = document.getElementById('numpad');
const hwTime      = document.getElementById('hw-time');
const hwDate      = document.getElementById('hw-date');
const stEls       = [document.getElementById('st1'), document.getElementById('st2')];

// ── REAL CLOCK ───────────────────────────────────────────
const DAYS   = ['日曜日','月曜日','火曜日','水曜日','木曜日','金曜日','土曜日'];
const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

function tickClock() {
  const n = new Date();
  const t = `${pad(n.getHours())}:${pad(n.getMinutes())}`;
  hwTime.textContent = t;
  stEls.forEach(el => { if(el) el.textContent = t; });
  hwDate.textContent = `${DAYS[n.getDay()]}, ${MONTHS[n.getMonth()]}${n.getDate()}日`;
}
tickClock();
setInterval(tickClock, 1000);

// ── NAVIGATION ───────────────────────────────────────────
clockIcon.addEventListener('click', openClock);
backRow.addEventListener('click',   closeClock);

function openClock() {
  resetSW();
  clockApp.classList.add('open');
}
function closeClock() {
  clockApp.classList.remove('open');
}

// ── STOPWATCH ────────────────────────────────────────────
fab.addEventListener('click', () => {
  if (!swRunning) startSW(); else stopSW();
});
resetBtn.addEventListener('click', () => { if (!swRunning) resetSW(); });

function startSW() {
  swRunning   = true;
  swStartTime = Date.now() - swElapsedMs;
  fab.textContent = 'STOP';
  fab.classList.add('stop');
  lapBtn.classList.add('on');
  swRafId = requestAnimationFrame(tickSW);
}

function stopSW() {
  cancelAnimationFrame(swRafId);
  swRunning = false;
  fab.textContent = 'START';
  fab.classList.remove('stop');
  resetBtn.classList.add('on');

  // フォース適用
  const forced = targetSum > 0 ? findForced(swElapsedMs, targetSum) : null;
  timeDsp.textContent = formatMs(forced !== null ? forced : swElapsedMs);
}

function resetSW() {
  cancelAnimationFrame(swRafId);
  swRunning = swElapsedMs = 0;
  fab.textContent = 'START';
  fab.classList.remove('stop');
  lapBtn.classList.remove('on');
  resetBtn.classList.remove('on');
  timeDsp.textContent = '00.00';
}

function tickSW() {
  swElapsedMs = Date.now() - swStartTime;
  timeDsp.textContent = formatMs(swElapsedMs);
  swRafId = requestAnimationFrame(tickSW);
}

// ── FORMAT ───────────────────────────────────────────────
function formatMs(ms) {
  const cs = Math.floor(ms / 10);
  const ss = Math.floor(cs / 100);
  const cc = cs % 100;
  return `${pad(ss)}.${pad(cc)}`;
}
function pad(n) { return String(n).padStart(2, '0'); }

// ── FORCE ALGORITHM ───────────────────────────────────────
// 観客が止めた瞬間、「各桁の合計 = targetSum」に最も近い時間を探して表示
function findForced(actualMs, T) {
  const actualCs = Math.round(actualMs / 10);
  for (let d = 0; d <= 1500; d++) {
    const checks = d === 0 ? [actualCs] : [actualCs + d, actualCs - d];
    for (const c of checks) {
      if (c < 50 || c > 9999) continue; // 0.50s〜99.99s の範囲
      const ss = Math.floor(c / 100);
      const cc = c % 100;
      // 4桁の和
      if (Math.floor(ss/10) + (ss%10) + Math.floor(cc/10) + (cc%10) === T) {
        return c * 10; // ms で返す
      }
    }
  }
  return null; // 万が一見つからなければ null（実際の時間を表示）
}

// ── TOUCH/MOUSE DEDUP（スマホの互換mouseイベント二重発火を防ぐ）──
let suppressMouseUntil = 0;
function addTapListener(el, handler, preventGhostClick) {
  el.addEventListener('touchstart', (e) => {
    suppressMouseUntil = Date.now() + 600;
    if (preventGhostClick) e.preventDefault();
    handler(e);
  }, { passive: !preventGhostClick });
  el.addEventListener('mousedown', (e) => {
    if (Date.now() < suppressMouseUntil) return;
    handler(e);
  });
}

// ── SECRET TRIGGER (ドック隙間トリプルタップ) ─────────────
function handleTap() {
  tapCount++;
  clearTimeout(tapTimerId);
  tapTimerId = setTimeout(() => { tapCount = 0; }, 700);
  if (tapCount >= 3) {
    tapCount = 0;
    openNumpad();
  }
}
addTapListener(triggerZone, handleTap);

// ── INVISIBLE NUMPAD ─────────────────────────────────────
// レイアウト（3×4、0%透明でマジシャンのみが位置を把握）:
// [1][2][3]
// [4][5][6]
// [7][8][9]
// [⌫][0][✓]
function openNumpad() {
  npInput = '';
  numpad.classList.add('active');
  vibrate([40, 30, 40, 30, 40]); // 「入力モード開始」合図（3連続）
  startNpTimeout();
}
function closeNumpad() {
  numpad.classList.remove('active');
  clearTimeout(npAutoClose);
}
function startNpTimeout() {
  clearTimeout(npAutoClose);
  npAutoClose = setTimeout(closeNumpad, 15000);
}

addTapListener(numpad, handleNp, true);

function handleNp(e) {
  const px = e.touches ? e.touches[0].clientX : e.clientX;
  const py = e.touches ? e.touches[0].clientY : e.clientY;
  const col = Math.min(Math.floor((px / window.innerWidth)  * 3), 2);
  const row = Math.min(Math.floor((py / window.innerHeight) * 4), 3);

  const keys = [['1','2','3'],['4','5','6'],['7','8','9'],['del','0','ok']];
  const k = keys[row][col];

  if (k === 'ok') {
    const v = parseInt(npInput);
    if (!isNaN(v) && v >= 1 && v <= 36) {
      targetSum = v;
      sessionStorage.setItem('sw_target', String(v));
      vibrate([60, 40, 60, 40, 200]); // 確定（強め）
    } else {
      vibrate([30,20,30,20,30,20,30,20,30]); // エラー
    }
    closeNumpad();
  } else if (k === 'del') {
    npInput = npInput.slice(0, -1);
    vibrate(25);
  } else {
    if (npInput.length < 2) {
      npInput += k;
      vibrate(45);
    }
  }
  startNpTimeout();
}

// ── VIBRATION ────────────────────────────────────────────
function vibrate(pat) {
  try { navigator.vibrate(pat); } catch(e) {}
}
</script>
</body>
</html>
